name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/ec2/**'
      - '.github/workflows/deploy-backend-ec2.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate GitHub secrets
        id: validate
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::Missing secret EC2_HOST — set to your EC2 public IP (e.g. 13.232.248.18)"
            missing=1
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "::error::Missing secret EC2_USER — set to ubuntu"
            missing=1
          fi
          if [ -z "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing secret EC2_SSH_PRIVATE_KEY — paste the full crm-key.pem file"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Add secrets: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Secrets present. Target: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          if ! grep -q 'BEGIN.*PRIVATE KEY' ~/.ssh/ec2_deploy_key; then
            echo "::error::EC2_SSH_PRIVATE_KEY is invalid — must include -----BEGIN ... PRIVATE KEY-----"
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          set -euo pipefail
          if ! ssh -i ~/.ssh/ec2_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'echo connected && hostname'; then
            echo ""
            echo "::error::SSH failed. Common fixes:"
            echo "  1. AWS Security Group → Inbound → SSH (22) from 0.0.0.0/0 (GitHub uses dynamic IPs)"
            echo "  2. EC2_SSH_PRIVATE_KEY = full .pem contents (no extra quotes)"
            echo "  3. EC2_HOST = public IPv4 only (no https://, no trailing spaces)"
            echo "  4. EC2 instance running and ubuntu user allowed"
            exit 1
          fi

      - name: Deploy on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'set -euo pipefail
             cd ~/quoreb2b-crm
             git pull origin main
             bash deploy/ec2/deploy-backend.sh'
