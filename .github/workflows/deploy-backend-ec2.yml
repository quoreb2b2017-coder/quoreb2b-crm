name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/ec2/**'
      - '.github/workflows/deploy-backend-ec2.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate GitHub secrets
        id: validate
        run: |
          set -euo pipefail
          missing=()
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            missing+=("EC2_HOST")
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            missing+=("EC2_USER")
          fi
          if [ -z "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ]; then
            missing+=("EC2_SSH_PRIVATE_KEY")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "## Deploy blocked — missing GitHub Actions secrets"
              echo ""
              echo "Add these in the repo:"
              echo "**Settings → Secrets and variables → Actions → New repository secret**"
              echo ""
              echo "| Secret | Example value |"
              echo "|--------|----------------|"
              echo "| \`EC2_HOST\` | \`13.232.248.18\` (public IPv4 only) |"
              echo "| \`EC2_USER\` | \`ubuntu\` |"
              echo "| \`EC2_SSH_PRIVATE_KEY\` | Full \`crm-key.pem\` file (BEGIN/END lines included) |"
              echo ""
              echo "**Missing now:** ${missing[*]}"
              echo ""
              echo "After saving secrets, re-run this workflow from the Actions tab."
              echo "See \`DEPLOY_EC2_VERCEL.md\` section **A8** for full setup."
            } >> "$GITHUB_STEP_SUMMARY"

            for name in "${missing[@]}"; do
              echo "::error::Missing secret $name"
            done
            exit 1
          fi

          echo "Secrets present. Target: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "Target host configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          set -euo pipefail
          if ! ssh -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'echo connected && hostname'; then
            {
              echo "## SSH connection failed"
              echo ""
              echo "1. AWS Security Group → Inbound → **SSH (22)** from \`0.0.0.0/0\` (GitHub uses dynamic IPs)"
              echo "2. \`EC2_SSH_PRIVATE_KEY\` = full \`crm-key.pem\` contents"
              echo "3. \`EC2_HOST\` = public IPv4 only (no \`https://\`, no spaces)"
              echo "4. EC2 instance running, \`ubuntu\` user allowed"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::SSH failed — see job summary for checklist"
            exit 1
          fi

      - name: Deploy on EC2
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'set -euo pipefail
             cd ~/quoreb2b-crm
             git pull origin main
             bash deploy/ec2/deploy-backend.sh'
