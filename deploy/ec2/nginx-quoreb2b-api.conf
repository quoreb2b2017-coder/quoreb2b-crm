# Nginx reverse proxy for QuoreB2B API (EC2)
# Install: sudo cp deploy/ec2/nginx-quoreb2b-api.conf /etc/nginx/sites-available/quoreb2b-api
#          sudo ln -sf /etc/nginx/sites-available/quoreb2b-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream quoreb2b_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.quoreb2b.com 13-232-248-18.sslip.io _;

    client_max_body_size 500m;
    client_body_timeout 3600s;
    send_timeout 3600s;

    location / {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    # Large master-data uploads — allow very long transfers
    location ~ ^/api/v[0-9]+/master-data/import {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    location /events {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /socket.io/ {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
