# Nginx reverse proxy for QuoreB2B API (EC2)
# Hostname: 65-2-186-189.sslip.io (public IP 65.2.186.189)
# HTTPS: bash deploy/ec2/ensure-ssl.sh  (certbot adds 443 block)

upstream quoreb2b_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name 65-2-186-189.sslip.io api.quoreb2b.com _;

    client_max_body_size 500m;
    client_body_timeout 3600s;
    client_body_buffer_size 256k;
    send_timeout 3600s;

    location / {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    location ~ ^/api/v[0-9]+/master-data/import {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    location /events {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /socket.io/ {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
