# Nginx reverse proxy for QuoreB2B API (EC2)
# SSL certs: sudo certbot --nginx -d 13-232-248-18.sslip.io

upstream quoreb2b_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Shared proxy settings (included in both HTTP and HTTPS blocks)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 13-232-248-18.sslip.io api.quoreb2b.com;

    ssl_certificate /etc/letsencrypt/live/13-232-248-18.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-232-248-18.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500m;
    client_body_timeout 3600s;
    send_timeout 3600s;

    location / {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    location ~ ^/api/v[0-9]+/master-data/import {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    location /events {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /socket.io/ {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name 13-232-248-18.sslip.io api.quoreb2b.com _;

    client_max_body_size 500m;
    client_body_timeout 3600s;
    send_timeout 3600s;

    location / {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    location ~ ^/api/v[0-9]+/master-data/import {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        proxy_request_buffering off;
    }

    location /events {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /socket.io/ {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
