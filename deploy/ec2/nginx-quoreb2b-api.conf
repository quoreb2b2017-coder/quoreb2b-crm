# Nginx reverse proxy for QuoreB2B API (EC2)
# Install: sudo cp deploy/ec2/nginx-quoreb2b-api.conf /etc/nginx/sites-available/quoreb2b-api
#          sudo ln -sf /etc/nginx/sites-available/quoreb2b-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace api.quoreb2b.com with your domain, or use server_name _ for IP-only testing.

upstream quoreb2b_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.quoreb2b.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Socket.io namespace: /events
    location /events {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Default socket.io path (fallback)
    location /socket.io/ {
        proxy_pass http://quoreb2b_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
