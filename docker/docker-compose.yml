version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: quoreb2b-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: quoreb2b
      MONGO_INITDB_ROOT_PASSWORD: quoreb2b_secret
      MONGO_INITDB_DATABASE: quoreb2b_crm
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - quoreb2b-network

  redis:
    image: redis:7-alpine
    container_name: quoreb2b-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - quoreb2b-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: quoreb2b-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - quoreb2b-network

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: quoreb2b-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ../backend/.env
    environment:
      MONGODB_URI: mongodb://quoreb2b:quoreb2b_secret@mongodb:27017/quoreb2b_crm?authSource=admin
      REDIS_HOST: redis
      ELASTICSEARCH_NODE: http://elasticsearch:9200
    depends_on:
      - mongodb
      - redis
      - elasticsearch
    networks:
      - quoreb2b-network

  crm-frontend:
    build:
      context: ../frontend/crm-frontend
      dockerfile: Dockerfile
    container_name: quoreb2b-crm-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://api:4000
    depends_on:
      - api
    networks:
      - quoreb2b-network

  client-frontend:
    build:
      context: ../frontend/client-frontend
      dockerfile: Dockerfile
    container_name: quoreb2b-client-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://api:4000
    depends_on:
      - api
    networks:
      - quoreb2b-network

  nginx:
    image: nginx:alpine
    container_name: quoreb2b-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - crm-frontend
      - client-frontend
    networks:
      - quoreb2b-network

  grafana:
    image: grafana/grafana:latest
    container_name: quoreb2b-grafana
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - quoreb2b-network

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  grafana_data:

networks:
  quoreb2b-network:
    driver: bridge
